name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]

# Permissions the official deploy-pages action requires.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; let a newer one supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags are REQUIRED: generate-meta reads commit dates
          # (staleness) and baseline/* tags. A shallow clone would blank both.
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # Bake git-derived baselines + staleness into generated/meta.json before
      # the build copies it into dist/. Must run after checkout's full history.
      - run: node scripts/generate-meta.mjs
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
